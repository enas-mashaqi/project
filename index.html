<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link href="./assets/css/output.css" rel="stylesheet" />
</head>

<body>
    <header
        class="fixed top-[24px] left-0 right-0 z-50 flex items-center justify-between px-10 py-4 max-w-7xl mx-auto rounded-full bg-slate-950/60 backdrop-blur-[20px]">

        <p class="text-highlights  text-2xl italic font-tinos lg:text-nowrap">ETHEREAL NAVIGATOR</p>

        <ul class="hidden lg:flex gap-[38px]   justify-between font-medium leading-6">
            <li><a href="#" class="text-sky-300 font-bold hoverA border-b-2">Home</a></li>
            <li><a href="#" class="hoverA">Destinatins</a></li>
            <li><a href="#" class="hoverA">Tours</a></li>
            <li><a href="#" class="hoverA">Offers</a></li>
            <li><a href="#" class="hoverA">Services</a></li>
            <li><a href="#" class="hoverA">Blog</a></li>
            <li><a href="#" class="hoverA">Contact</a></li>
        </ul>

        <button class="bg-primary rounded-full px-6 py-2.5 font-medium hoverButton">Book Exclusive Trip</button>

    </header>
    <main>
        <section class=" hero text-center flex justify-center items-center h-[800px] ">
            <img src="./assets/image/hero.webp" alt="heroImage" class="relative w-full h-full" />
            <div class=" absolute  ">
                <p class=" font-medium tracking-[2.8px] leading-[20px] text-primary">THE ART OF REFINED
                    DISCOVERY</p>
                 
                <h1 class="italic max-w-3xl text-center  font-bold text-5xl  md:text-7xl lg:text-8xl my-[33px]">Beyond the <span
                        class="text-primary font-tinos">Horizon</span></h1>
                     
                <div class="flex max-md:flex-col justify-center items-center gap-[24px]">
                    <button class="capitalize font-bold bg-gradient-to-r from-primaryAccent to-purple-400 backdrop-blur-md rounded-full px-[40px] py-[16px] hoverButton">explore
                        collections</button>
                    <button class="capitalize outline-1 rounded-full font-bold px-[40px] py-[16px] hoverButton  hover:bg-white/35  ">curate my
                        journey</button>
                </div>
            </div>
        </section>

        <section class="searchBar relative -mt-24 z-20 px-6  ">
        <div class=" max-w-5xl mx-auto px-6  py-[16px] bg-gradient-to-b from-teal-700/50 via-teal-700/50 to-black/50 backdrop-opacity-100 backdrop-blur-3xl rounded-[2rem] border border-white/10 shadow-2xl">
            <div class="grid w-full grid-cols-1 md:grid-cols-4 gap-[16px] ">
            <div class="flex flex-col justify-center md:border-e-[1px] border-white/10  ps-[6px] ">
                <label class="uppercase text-[12px]">destination</label>
                <div class="flex items-center gap-[10px] ">
                    <span class="py-[9px]"><img src="./assets/image/searchBar/locationcon.svg"/></span>
                    <input type="text" placeholder="Where to next?" class="py-[12px]  "/>
                </div>
            </div>
            <div class=" flex flex-col justify-center md:border-e-[1px] border-white/10  ps-[6px]">
                <label class="uppercase text-[12px]">experinence type </label>
                <div class="flex items-center gap-[10px] ">
                    <span class="py-[9px]"><img src="./assets/image/searchBar/magicIcon.svg"/></span>
                    <select class="py-[12px]">
                        <option class="bg-black " >Private island</option>
                        <option class="bg-black">Ski chalet</option>
                        <option class="bg-black">Safari suite</option>
                    </select>
                </div>
            </div>
            <div class="flex flex-col justify-center ps-[6px]" >
                <label class="uppercase text-[12px]">travelers</label>
                <div class="flex items-center gap-[10px]">
                    <span class="py-[9px]"><img src="./assets/image/searchBar/usersIcon.svg"/></span>
                    <input type="text" placeholder="Guests" class="py-[12px]"/>
                </div>
            </div>
            <div class="">
               <button class="bg-gradient-to-r from-secondaryAccent to-highlights py-[36.5px] px-[68px] rounded-2xl flex justify-center  items-center w-full h-full gap-2 font-extrabold hoverButton">
                <span><img src="./assets/image/searchBar/searchIcon.svg"/> </span>
                <span class="capitalize">discover</span>
            </button>
            </div>
        </div>
        </div>
        </section>
    </main>
</body>

</html>
